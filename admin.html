<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>لوحة التحكم - رفع الصور</title>
  <link rel="stylesheet" href="style2.css" />
  <style>
    /* التصميم العام */
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background-color: #191211; /* خلفية رئيسية داكنة */
  color: #D6D7D2; /* لون النص الرمادي الفاتح */
  margin: 0;
  padding: 0;
  direction: rtl;
}

.login-container, .admin-container {
  max-width: 400px;
  margin: 80px auto;
  background-color: #fff;
  padding: 25px;
  border-radius: 10px;
  box-shadow: 0 0 12px rgba(0, 0, 0, 0.1);
}

h2 {
  margin-bottom: 20px;
  text-align: center;
  color: #C7372C; /* لون رئيسي */
}

input[type="email"], input[type="password"], input[type="file"], input[type="text"], textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: 1px solid #94938F; /* لون النص الرمادي المتوسط */
  border-radius: 6px;
  box-sizing: border-box;
  background-color: #333; /* خلفية خفيفة جدًا */
  color: #D6D7D2; /* لون النص الرمادي الفاتح */
}

button {
  width: 100%;
  padding: 12px;
  background-color: #C7372C; /* لون رئيسي */
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background-color: #710D0B; /* لون ثانوي */
}

.logout-btn {
  background-color: #710D0B; /* لون ثانوي */
  margin-left: 10px;
}

.logout-btn:hover {
  background-color: #C7372C; /* لون رئيسي */
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

#error-message, #uploadMessage {
  color: red;
  margin-top: 10px;
  text-align: center;
}

@media screen and (max-width: 480px) {
  .login-container, .admin-container {
    margin: 40px 20px;
    padding: 20px;
  }

  h2 {
    font-size: 20px;
  }

  button {
    font-size: 15px;
  }
}

    /* تحسينات إضافية */
    .loading {
      display: none;
      text-align: center;
      margin: 15px 0;
    }
    
    .loading-spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #C7372C;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .image-preview {
      display: none;
      max-width: 100%;
      max-height: 200px;
      margin: 15px 0;
      border-radius: 8px;
      border: 2px dashed #C7372C;
    }
    
    .form-step {
      display: none;
    }
    
    .form-step.active {
      display: block;
    }
    
    .step-navigation {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }
    
    .step-btn {
      padding: 10px 20px;
      background-color: #4A4743;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    
    .step-btn:hover {
      background-color: #5a5753;
    }
    
    .step-btn.primary {
      background-color: #C7372C;
    }
    
    .step-btn.primary:hover {
      background-color: #710D0B;
    }
    
    .step-btn:disabled {
      background-color: #666;
      cursor: not-allowed;
    }
    
    .upload-progress {
      width: 100%;
      height: 20px;
      background-color: #f3f3f3;
      border-radius: 10px;
      margin: 15px 0;
      overflow: hidden;
      display: none;
    }
    
    .progress-bar {
      height: 100%;
      background-color: #C7372C;
      width: 0%;
      transition: width 0.3s ease;
    }

    .success-message {
      background-color: #4CAF50;
      color: white;
      padding: 15px;
      border-radius: 5px;
      margin: 15px 0;
      text-align: center;
    }

    .error-message {
      background-color: #f44336;
      color: white;
      padding: 15px;
      border-radius: 5px;
      margin: 15px 0;
      text-align: center;
    }

    .cloudinary-info {
      background-color: #f8f9fa;
      border-left: 4px solid #007bff;
      padding: 10px 15px;
      margin: 15px 0;
      border-radius: 4px;
    }
    
    .check-settings-btn {
      background-color: #4A4743;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      margin: 10px 0;
      display: block;
      width: 100%;
    }
    
    .check-settings-btn:hover {
      background-color: #5a5753;
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <div class="top-bar">
      <h2>لوحة التحكم - المسؤول</h2>
      <button onclick="logout()" class="logout-btn">تسجيل الخروج</button>
    </div>

    <div class="cloudinary-info">
      <strong>معلومات Cloudinary:</strong> تم التهيئة بنجاح (Cloud Name: dcq3dq2dq)
      <button onclick="checkCloudinarySettings()" class="check-settings-btn">التحقق من إعدادات Cloudinary</button>
    </div>

    <div id="step1" class="form-step active">
      <h3>الخطوة 1: معلومات أساسية</h3>
      <form id="uploadForm">
        <div class="form-group">
          <label for="title">عنوان الصورة *</label>
          <input type="text" id="title" placeholder="مثال: ناروتو أوزوماكي" required />
        </div>
        
        <div class="form-group">
          <label for="anime">اسم الأنمي *</label>
          <input type="text" id="anime" placeholder="مثال: ناروتو" required />
        </div>
        
        <div class="form-group">
          <label for="type">نوع المحتوى *</label>
          <select id="type" required>
            <option value="">اختر النوع</option>
            <option value="character">شخصية</option>
            <option value="wallpaper">خلفية</option>
          </select>
        </div>
        
        <div class="step-navigation">
          <div></div>
          <button type="button" class="step-btn primary" onclick="showStep(2)">التالي</button>
        </div>
      </form>
    </div>

    <div id="step2" class="form-step">
      <h3>الخطوة 2: معلومات إضافية</h3>
      <div class="form-group">
        <label for="birthdate">تاريخ الميلاد</label>
        <input type="text" id="birthdate" placeholder="مثال: 10 أكتوبر" />
      </div>
      
      <div class="form-group">
        <label for="seasons">عدد المواسم</label>
        <input type="text" id="seasons" placeholder="مثال: 10+" />
      </div>
      
      <div class="form-group">
        <label for="start_date">تاريخ البداية</label>
        <input type="text" id="start_date" placeholder="مثال: 2002" />
      </div>
      
      <div class="step-navigation">
        <button type="button" class="step-btn" onclick="showStep(1)">السابق</button>
        <button type="button" class="step-btn primary" onclick="showStep(3)">التالي</button>
      </div>
    </div>

    <div id="step3" class="form-step">
      <h3>الخطوة 3: الصورة والتفاصيل</h3>
      
      <div class="form-group">
        <label for="imageInput">رفع الصورة *</label>
        <input type="file" id="imageInput" accept="image/*" required onchange="previewImage(this)" />
        <small>الحد الأقصى لحجم الملف: 5MB (JPEG, PNG, WebP)</small>
      </div>
      
      <img id="imagePreview" class="image-preview" alt="معاينة الصورة">
      
      <div class="upload-progress" id="uploadProgress">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      
      <div class="form-group">
        <label for="details">تفاصيل الشخصية *</label>
        <textarea id="details" placeholder="وصف مفصل للشخصية أو الخلفية..." required rows="5"></textarea>
      </div>
      
      <div class="step-navigation">
        <button type="button" class="step-btn" onclick="showStep(2)">السابق</button>
        <button type="button" id="uploadBtn" class="step-btn primary" onclick="uploadImage()">رفع الصورة</button>
      </div>
    </div>

    <div class="loading" id="loading">
      <div class="loading-spinner"></div>
      <p>جاري رفع الصورة...</p>
    </div>

    <div id="successMessage" class="success-message" style="display: none;">
      ✅ تم رفع الصورة بنجاح!
    </div>

    <div id="errorMessage" class="error-message" style="display: none;">
      ❌ حدث خطأ أثناء الرفع
    </div>

    <p id="uploadMessage"></p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script>
    // تهيئة Firebase للمصادقة وقاعدة البيانات فقط
    const firebaseConfig = {
      apiKey: "AIzaSyDPSXK02S0Em-0ZLl2zhH6M6loW3VYpReA",
      authDomain: "anime-gallery-b0a34.firebaseapp.com",
      projectId: "anime-gallery-b0a34",
      databaseURL: "https://anime-gallery-b0a34-default-rtdb.firebaseio.com/",
      messagingSenderId: "39241660436",
      appId: "1:39241660436:web:c35efd2748674b5a824f01",
      measurementId: "G-FH2B5ZDFRQ"
    };

    // محاولة تهيئة Firebase
    try {
      firebase.initializeApp(firebaseConfig);
      console.log("Firebase initialized successfully (Authentication and Database only)");
    } catch (error) {
      console.error("Error initializing Firebase:", error);
      showMessage("❌ خطأ في تهيئة Firebase: " + error.message, "error");
    }

    const auth = firebase.auth();
    const database = firebase.database();

    // إعداد Cloudinary
    const CLOUDINARY_CLOUD_NAME = 'dcq3dq2dq';
    const CLOUDINARY_UPLOAD_PRESET = 'anime_gallery';

    // التحقق من حالة المصادقة
    auth.onAuthStateChanged((user) => {
      if (!user) {
        console.log("User not authenticated, redirecting to login");
        window.location.href = "login.html";
      } else {
        console.log("User authenticated:", user.email);
      }
    });

    // تسجيل الخروج
    function logout() {
      auth.signOut().then(() => {
        window.location.href = "login.html";
      }).catch((error) => {
        console.error("Logout error:", error);
        showMessage("❌ خطأ في تسجيل الخروج: " + error.message, "error");
      });
    }

    // التنقل بين الخطوات
    function showStep(stepNumber) {
      document.querySelectorAll('.form-step').forEach(step => {
        step.classList.remove('active');
      });
      document.getElementById('step' + stepNumber).classList.add('active');
    }

    // معاينة الصورة
    function previewImage(input) {
      const preview = document.getElementById('imagePreview');
      const uploadBtn = document.getElementById('uploadBtn');
      
      if (input.files && input.files[0]) {
        const file = input.files[0];
        
        // التحقق من نوع الملف
        const validTypes = ['image/jpeg', 'image/png', 'image/webp'];
        if (!validTypes.includes(file.type)) {
          showMessage('❌ نوع الملف غير مدعوم. يرجى رفع صورة بصيغة JPEG أو PNG أو WebP', 'error');
          input.value = '';
          preview.style.display = 'none';
          uploadBtn.disabled = true;
          return;
        }
        
        // التحقق من حجم الملف
        if (file.size > 5 * 1024 * 1024) {
          showMessage('❌ حجم الصورة كبير جداً. الحد الأقصى هو 5MB', 'error');
          input.value = '';
          preview.style.display = 'none';
          uploadBtn.disabled = true;
          return;
        }
        
        const reader = new FileReader();
        
        reader.onload = function(e) {
          preview.src = e.target.result;
          preview.style.display = 'block';
          uploadBtn.disabled = false;
        };
        
        reader.readAsDataURL(file);
        showMessage('');
      } else {
        preview.style.display = 'none';
        uploadBtn.disabled = true;
      }
    }

    // عرض الرسائل
    function showMessage(message, type = 'info') {
      const messageElement = document.getElementById('uploadMessage');
      messageElement.innerText = message;
      messageElement.style.color = type === 'error' ? '#ff6b6b' : '#4CAF50';
    }

    // إظهار/إخفاء تحميل
    function setLoading(loading) {
      document.getElementById('loading').style.display = loading ? 'block' : 'none';
    }

    // دالة رفع الصورة إلى Cloudinary
    async function uploadToCloudinary(file) {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
      
      const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, {
        method: 'POST',
        body: formData
      });
      
      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        console.error('Cloudinary upload error:', errorData);
        throw new Error(errorData.error?.message || `فشل في رفع الصورة: ${response.status}`);
      }
      
      const data = await response.json();
      return data.secure_url;
    }

    // دالة للتحقق من إعدادات Cloudinary
    function checkCloudinarySettings() {
      console.log("=== التحقق من إعدادات Cloudinary ===");
      console.log("Cloud Name:", CLOUDINARY_CLOUD_NAME);
      console.log("Upload Preset:", CLOUDINARY_UPLOAD_PRESET);
      
      // اختبار الاتصال بـ Cloudinary
      fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, {
        method: 'OPTIONS'
      })
      .then(response => {
        console.log("الاتصال بـ Cloudinary:", response.ok ? "✅ نجح" : "❌ فشل");
      })
      .catch(error => {
        console.error("خطأ في الاتصال بـ Cloudinary:", error);
      });
      
      console.log("=== انتهى التحقق ===");
      alert("تم التحقق من الإعدادات. راجع console للتفاصيل.");
    }

    // دالة رفع الصورة الرئيسية
    async function uploadImage() {
      const title = document.getElementById('title').value;
      const anime = document.getElementById('anime').value;
      const imageFile = document.getElementById('imageInput').files[0];
      const birthdate = document.getElementById('birthdate').value;
      const seasons = document.getElementById('seasons').value;
      const start_date = document.getElementById('start_date').value;
      const type = document.getElementById('type').value;
      const details = document.getElementById('details').value;
      const uploadBtn = document.getElementById('uploadBtn');

      if (!title || !anime || !imageFile || !type || !details) {
        showMessage('❌ يرجى ملء جميع الحقول المطلوبة', 'error');
        return;
      }

      uploadBtn.disabled = true;
      uploadBtn.textContent = 'جاري الرفع...';
      setLoading(true);
      showMessage('');
      document.getElementById('successMessage').style.display = 'none';
      document.getElementById('errorMessage').style.display = 'none';

      try {
        // رفع الصورة إلى Cloudinary
        const imageUrl = await uploadToCloudinary(imageFile);
        console.log('Image uploaded to Cloudinary:', imageUrl);
        
        // حفظ البيانات في Firebase Database
        const imageData = {
          title: title,
          anime: anime,
          image: imageUrl,
          birthdate: birthdate || 'غير معروف',
          seasons: seasons || 'غير معروف',
          start_date: start_date || 'غير معروف',
          type: type,
          details: details,
          uploadedAt: new Date().toISOString(),
          uploadedBy: auth.currentUser.email
        };

        await database.ref('images').push(imageData);
        
        document.getElementById('successMessage').style.display = 'block';
        showMessage('✅ تم رفع الصورة بنجاح!', 'success');
        resetForm();
        
      } catch (error) {
        console.error('Upload error:', error);
        let errorMessage = 'حدث خطأ أثناء الرفع';
        
        if (error.message.includes('upload_preset')) {
          errorMessage = 'إعدادات Cloudinary غير صحيحة. يرجى التحقق من Upload Preset.';
        } else {
          errorMessage = error.message;
        }
        
        document.getElementById('errorMessage').style.display = 'block';
        document.getElementById('errorMessage').innerHTML = '❌ ' + errorMessage;
        showMessage('❌ ' + errorMessage, 'error');
      } finally {
        setLoading(false);
        uploadBtn.disabled = false;
        uploadBtn.textContent = 'رفع الصورة';
      }
    }

    // إعادة تعيين النموذج
    function resetForm() {
      document.getElementById('uploadForm').reset();
      document.getElementById('birthdate').value = '';
      document.getElementById('seasons').value = '';
      document.getElementById('start_date').value = '';
      document.getElementById('details').value = '';
      document.getElementById('imagePreview').style.display = 'none';
      showStep(1);
    }

    // تهيئة الصفحة
    document.addEventListener('DOMContentLoaded', function() {
      console.log("Admin panel loaded");
      console.log("Cloudinary Cloud Name:", CLOUDINARY_CLOUD_NAME);
      console.log("Upload Preset:", CLOUDINARY_UPLOAD_PRESET);
    });
  </script>
</body>
</html>
